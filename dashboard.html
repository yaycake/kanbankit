<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3Cpath d='M9 13l3 3 5-5' fill='none' stroke='%23D97757' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='12' width='5' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='20' width='10' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='25' width='7' height='2' rx='1' fill='%23c4c4c2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f5;
      --bg-secondary: #F5F4EF;
      --bg-card: #ffffff;
      --text-primary: #141413;
      --text-secondary: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --border: #e5e4df;
      --border-light: #eeeee9;
      --shadow: rgba(20, 20, 19, 0.04);
      --shadow-hover: rgba(20, 20, 19, 0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      padding: 20px 24px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      margin-left: 16px;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-radius: 6px;
    }

    .view-toggle button:hover {
      color: var(--text-primary);
      background: transparent;
    }

    .view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .buttons { display: flex; gap: 12px; }

    button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== TASKS STYLES ===== */

    .board {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 24px;
      flex: 1;
      min-height: 0;
    }

    .column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 340px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
    }

    .column-header {
      padding: 16px 18px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }

    .column-header:active {
      cursor: grabbing;
    }

    .column.dragging-column {
      opacity: 0.5;
    }

    .column-drop-indicator {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 -2px;
      min-height: 100px;
    }

    .column-header .count {
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      min-height: 100px;
    }

    .cards.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .card-footer button[data-action="toggle-timeline"] {
      opacity: 0.45;
      transition: opacity 0.15s;
    }

    .task-card:hover .card-footer button[data-action="toggle-timeline"],
    .card-footer button[data-action="toggle-timeline"].active {
      opacity: 1;
      color: var(--accent) !important;
    }

    .project-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
      box-shadow: 0 1px 2px var(--shadow);
      position: relative;
    }

    .task-card:hover {
      box-shadow: 0 3px 10px var(--shadow-hover);
      border-color: var(--border);
    }

    .task-card .delete-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 5px;
      font-size: 13px;
      line-height: 1;
      border-radius: 4px;
      opacity: 0.6;
    }

    .task-card:hover .delete-btn { display: block; }
    .task-card .delete-btn:hover { background: var(--bg-secondary); color: var(--accent); opacity: 1; }
    .task-card.dragging { opacity: 0.4; transform: rotate(1.5deg); }

    .card-title {
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text-primary);
    }

    .card-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    .card-subtasks {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .subtask {
      padding: 2px 0;
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      cursor: pointer;
      transition: all 0.12s ease;
      background: var(--bg-card);
      margin-top: 1px;
    }

    .checkbox:hover { border-color: var(--accent); }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '';
      width: 4px;
      height: 7px;
      border: solid white;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
      margin-bottom: 1px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state .empty-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-card);
      border: 1.5px dashed var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 400px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .empty-state .empty-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(217, 119, 87, 0.08);
    }

    .empty-state .empty-icon {
      width: 44px;
      height: 44px;
      background: #FEF0EB;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .empty-state h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 280px;
    }

    .empty-state button {
      font-size: 14px;
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 8px;
    }

    .empty-state button:hover {
      background: var(--accent-hover);
    }

    .status-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(20, 20, 19, 0.15);
      z-index: 200;
    }

    .status-bar.visible { opacity: 1; }

    .add-card {
      padding: 12px;
    }

    .add-card button {
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .add-card button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .new-task-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
    }

    .new-task-input:focus {
      outline: none;
    }

    .new-task-input::placeholder {
      color: var(--text-muted);
    }

    /* Scrollbar styling */
    .cards::-webkit-scrollbar,
    .list-view::-webkit-scrollbar {
      width: 6px;
    }

    .cards::-webkit-scrollbar-track,
    .list-view::-webkit-scrollbar-track {
      background: transparent;
    }

    .cards::-webkit-scrollbar-thumb,
    .list-view::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .cards::-webkit-scrollbar-thumb:hover,
    .list-view::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* List View Styles */
    .list-view {
      max-width: 800px;
      margin: 0 auto;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .list-section {
      margin-bottom: 28px;
    }

    .list-section.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
      margin: 0 -12px 32px;
      padding: 0 12px;
    }

    .list-section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      padding: 4px 0;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-section-header .section-title {
      cursor: pointer;
    }

    .list-section-header .section-title:hover {
      color: var(--text-primary);
    }

    .list-section-header .count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      cursor: grab;
      position: relative;
      border-radius: 10px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .list-item:active {
      cursor: grabbing;
    }

    .list-item:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .list-item.dragging {
      opacity: 0.5;
      background: var(--bg-secondary);
    }

    .list-item .checkbox {
      margin-top: 2px;
      flex-shrink: 0;
    }

    .list-item-content {
      flex: 1;
      min-width: 0;
    }

    .list-item-title {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .list-item-title.checked {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .list-item-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      cursor: pointer;
    }

    .list-item-note:hover {
      color: var(--text-secondary);
    }

    .list-item-note.add-note {
      font-style: italic;
      display: none;
    }

    .list-item:hover .list-item-note.add-note {
      display: block;
    }

    .list-item-subtasks {
      margin-top: 8px;
      padding-left: 2px;
    }

    .list-item-subtask {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .list-item-subtask .checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-top: 1px;
    }

    .list-item-subtask span {
      cursor: pointer;
    }

    .list-item-subtask span:hover {
      color: var(--text-primary);
    }

    .list-item-add-subtask {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      cursor: pointer;
      padding: 3px 0;
      padding-left: 24px;
      display: none;
    }

    .list-item:hover .list-item-add-subtask {
      display: block;
    }

    .list-item-add-subtask:hover {
      color: var(--accent);
    }

    .list-item-section {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .list-item-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
    }

    .list-item:hover .list-item-actions {
      display: flex;
      gap: 4px;
    }

    .list-item-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .list-item-actions button:hover {
      background: var(--bg-card);
      color: var(--accent);
    }

    .list-drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px -12px;
    }

    .list-add-section {
      margin-top: 16px;
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .list-add-section:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quick-add {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .quick-add-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 15px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    .quick-add-section {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .quick-add-section:hover {
      border-color: var(--accent);
    }

    .section-picker {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow-hover);
      padding: 4px;
      z-index: 100;
    }

    .section-picker button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-radius: 6px;
    }

    .section-picker button:hover {
      background: var(--bg-secondary);
    }

    /* ===== MEMORY STYLES ===== */

    .memory-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .memory-tab {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
      text-transform: capitalize;
    }

    .memory-tab:hover { color: var(--text-primary); }

    .memory-tab.active {
      color: var(--text-primary);
      background: var(--bg-card);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-tab .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
      color: var(--text-muted);
    }

    .memory-tab.active .count {
      background: var(--border-light);
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .memory-flat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .memory-flat-table th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .memory-flat-table td {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .memory-flat-table td:first-child {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      width: 120px;
    }

    .memory-flat-table tr:last-child td {
      border-bottom: none;
    }

    .memory-flat-table tr:hover td {
      background: var(--bg-secondary);
    }

    .memory-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .memory-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .memory-card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .memory-card-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .memory-card-fields {
      margin-top: 10px;
      font-size: 12px;
    }

    .memory-card-field {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .memory-card-field-label {
      color: var(--text-muted);
      min-width: 80px;
    }

    .memory-card-field-value {
      color: var(--text-secondary);
    }

    .file-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .file-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .file-card-header:hover {
      background: var(--bg-secondary);
    }

    .file-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .file-card-content {
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-y: auto;
      display: none;
      color: var(--text-secondary);
    }

    .file-card-content.expanded {
      display: block;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 100px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
      margin-top: 4px;
    }

    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      padding: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .markdown-content {
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .markdown-content h1 { font-size: 1.4em; margin: 16px 0 8px; color: var(--text-primary); }
    .markdown-content h2 { font-size: 1.2em; margin: 14px 0 6px; color: var(--text-primary); }
    .markdown-content h3 { font-size: 1.1em; margin: 12px 0 4px; color: var(--text-secondary); }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { margin: 8px 0 8px 20px; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text-primary);
    }
    .markdown-content pre {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border-light);
    }
    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }
    .markdown-content th, .markdown-content td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    .markdown-content th {
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 19, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(20, 20, 19, 0.2);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .form-group textarea {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
      min-height: 300px;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Tab panel containers */
    .tab-panel {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .tab-panel.active {
      display: flex;
    }

    /* Memory panel scrollable area */
    .memory-content-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .memory-content-area::-webkit-scrollbar {
      width: 6px;
    }

    .memory-content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .memory-content-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .memory-content-area::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .file-card-content::-webkit-scrollbar,
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .file-card-content::-webkit-scrollbar-track,
    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-card-content::-webkit-scrollbar-thumb,
    .modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .file-card-content::-webkit-scrollbar-thumb:hover,
    .modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* File path display */
    .file-path {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
<div>
        <div id="titleWrapper" style="display:flex;align-items:center;gap:6px;cursor:pointer;" title="Click to rename">
          <h1 id="dashTitle" style="cursor:pointer;"></h1>
          <svg id="titlePencil" width="13" height="13" viewBox="0 0 13 13" fill="none"
            style="opacity:0;transition:opacity 0.15s;flex-shrink:0;color:var(--text-muted);">
            <path d="M9 2L11 4L4.5 10.5L2 11L2.5 8.5L9 2Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div id="filePath" class="file-path"></div>
      </div>
      <div class="view-toggle" id="mainTabToggle">
        <button id="tasksTabBtn" class="active">Tasks</button>
        <button id="memoryTabBtn">Memory</button>
      </div>
    </div>
    <div class="buttons">
      <button id="openTaskBtn" style="display:none;">Select File</button>
      <button id="openMemoryBtn" style="display: none;">Reload</button>
      <button id="saveBtn" style="display:none;" disabled>Save</button>
      <button id="undoBtn" disabled title="Undo last action" style="display:flex;align-items:center;justify-content:center;width:36px;padding:0;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 5.5H8.5C10.157 5.5 11.5 6.843 11.5 8.5C11.5 10.157 10.157 11.5 8.5 11.5H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 3L2 5.5L4 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="addTaskBtn" class="primary" style="display:flex;align-items:center;gap:5px;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        Add task
      </button>
    </div>
  </header>

  <!-- Project filter bar -->
  <div id="filterBar" style="display:none;padding:0 0 14px;flex-shrink:0;"></div>

  <!-- TASKS TAB PANEL -->
  <div class="tab-panel active" id="tasksPanel">
    <div class="list-view" id="listView" style="display: none;"></div>
    <div class="board" id="board">
      <div class="empty-state" id="boardEmptyState" style="width:100%;display:flex;align-items:center;justify-content:center;">
        <div class="empty-card">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M6 2h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M7 7h4M7 11h8M7 15h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>Open your Tasks</h2>
          <p>Click to select and open your <strong>TASKS.md</strong> file, where your tasks live — Claude reads and writes here.</p>
          <button id="openBtnLarge">Select TASKS.md</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MEMORY TAB PANEL -->
  <div class="tab-panel" id="memoryPanel">
    <div id="memoryEmptyState" class="empty-state">
      <p style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: var(--text-primary);">Select your project folder</p>
      <button id="openMemoryBtnLarge">Select Folder</button>
    </div>
    <div id="memoryMainContent" style="display: none; flex-direction: column; min-height: 0; flex: 1;">
      <div class="memory-tabs" id="memoryTabsContainer"></div>
      <div class="memory-content-area">
        <div id="memoryContentContainer"></div>
      </div>
    </div>
  </div>

  <!-- MODAL (shared for memory) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script>
    // ===== EMBEDDED TASKS CONTENT (auto-updated by Claude) =====
    // EMBEDDED_TASKS_START
    const EMBEDDED_TASKS = `# Tasks

## To Do

## In Progress

## Complete
`;
    // EMBEDDED_TASKS_END

    // ===== SHARED STATE =====
    let activeMainTab = 'tasks'; // 'tasks' or 'memory'

    const statusEl = document.getElementById('status');
    const filePathEl = document.getElementById('filePath');

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), 2000);
    }

    // ===== EDITABLE TITLE =====
    const dashTitleEl   = document.getElementById('dashTitle');
    const titleWrapper  = document.getElementById('titleWrapper');
    const titlePencil   = document.getElementById('titlePencil');

    function loadTitle() {
      return localStorage.getItem('kbk-title') || 'Projects';
    }
    function saveTitle(val) {
      localStorage.setItem('kbk-title', val);
      document.title = val;
    }

    dashTitleEl.textContent = loadTitle();
    document.title = loadTitle();

    titleWrapper.addEventListener('mouseenter', () => titlePencil.style.opacity = '1');
    titleWrapper.addEventListener('mouseleave', () => titlePencil.style.opacity = '0');

    titleWrapper.addEventListener('click', () => {
      const current = dashTitleEl.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = current;
      input.style.cssText = `font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;font-family:inherit;color:var(--text-primary);background:transparent;border:none;border-bottom:2px solid var(--accent);outline:none;width:${Math.max(current.length, 6)}ch;`;
      dashTitleEl.replaceWith(input);
      titlePencil.style.opacity = '0';
      input.focus();
      input.select();

      const commit = () => {
        const val = input.value.trim() || 'Projects';
        saveTitle(val);
        const h1 = document.createElement('h1');
        h1.id = 'dashTitle';
        h1.style.cursor = 'pointer';
        h1.textContent = val;
        input.replaceWith(h1);
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = current; input.blur(); }
      });
    });

    // ===== MAIN TAB SWITCHING =====
    const tasksTabBtn = document.getElementById('tasksTabBtn');
    const memoryTabBtn = document.getElementById('memoryTabBtn');
    const tasksPanel = document.getElementById('tasksPanel');
    const memoryPanel = document.getElementById('memoryPanel');
    const openTaskBtn = document.getElementById('openTaskBtn');
    const openMemoryBtn = document.getElementById('openMemoryBtn');
    const saveBtn = document.getElementById('saveBtn');

    function switchMainTab(tab) {
      activeMainTab = tab;

      tasksTabBtn.classList.toggle('active', tab === 'tasks');
      memoryTabBtn.classList.toggle('active', tab === 'memory');

      tasksPanel.classList.toggle('active', tab === 'tasks');
      memoryPanel.classList.toggle('active', tab === 'memory');

      // Show/hide filter bar (contains view toggle) for tasks
      const filterBar = document.getElementById('filterBar');
      if (filterBar) filterBar.style.display = tab === 'tasks' ? 'flex' : 'none';

      // Show/hide appropriate buttons
      openMemoryBtn.style.display = tab === 'memory' ? 'inline-flex' : 'none';
      document.getElementById('undoBtn').style.display = tab === 'tasks' ? 'flex' : 'none';
      document.getElementById('addTaskBtn').style.display = tab === 'tasks' ? 'flex' : 'none';

      // Auto-load memory when switching to that tab
      if (tab === 'memory' && !memoryData.claudeMd && memoryData.memoryFiles.length === 0) {
        loadMemoryDirectory();
      }

      // Update file path display
      if (tab === 'tasks') {
        filePathEl.textContent = taskFileHandle ? taskFileName : '';
      } else {
        filePathEl.textContent = memoryDirHandle ? memoryDirHandle.name : '';
      }
    }

    tasksTabBtn.addEventListener('click', () => switchMainTab('tasks'));
    memoryTabBtn.addEventListener('click', () => switchMainTab('memory'));

    // ============================================================
    // ===== TASKS FUNCTIONALITY =====
    // ============================================================

    let saveDebounce = null;

    let taskFileHandle = null;
    let taskFileName = '';
    let lastFetchedContent = '';
    let sections = [];
    let tasks = {};
    let hasChanges = false;
    let currentView = 'board';
    let quickAddSection = null;
    let undoStack = [];
    let activeProjectFilter = null;

    // ── Activity / timeline ───────────────────────────────────────────────
    let activityData = {}; // { [taskHash]: [{type, ts, ...}] }

    function taskHash(title) {
      let h = 5381;
      for (let i = 0; i < title.length; i++) {
        h = (((h << 5) + h) + title.charCodeAt(i)) | 0;
      }
      return Math.abs(h).toString(36);
    }

    function recordActivity(taskTitle, entry) {
      const key = taskHash(taskTitle);
      if (!activityData[key]) activityData[key] = [];
      activityData[key].unshift({ ...entry, ts: new Date().toISOString() });
      markChanged();
    }

    function getActivity(taskTitle) {
      return activityData[taskHash(taskTitle)] || [];
    }

    // ── Undo stack ────────────────────────────────────────────────────────────
    function pushUndo() {
      undoStack.push(JSON.stringify({
        sections: JSON.parse(JSON.stringify(sections)),
        tasks: JSON.parse(JSON.stringify(tasks)),
        activityData: JSON.parse(JSON.stringify(activityData)),
      }));
      if (undoStack.length > 50) undoStack.shift();
      updateUndoBtn();
    }

    function updateUndoBtn() {
      const btn = document.getElementById('undoBtn');
      if (btn) btn.disabled = undoStack.length === 0;
    }

    function undo() {
      if (!undoStack.length) return;
      const snap = JSON.parse(undoStack.pop());
      sections = snap.sections;
      tasks = snap.tasks;
      activityData = snap.activityData;
      updateUndoBtn();
      markChanged();
      renderTasks();
      renderFilterBar();
    }

    // ── Project filter bar ────────────────────────────────────────────────────
    function renderFilterBar() {
      const bar = document.getElementById('filterBar');
      if (!bar) return;

      bar.style.cssText = 'display:flex;align-items:center;gap:6px;padding:0 0 14px;flex-shrink:0;flex-wrap:nowrap;';
      bar.innerHTML = '';

      // Left side: project filter pills
      const pillGroup = document.createElement('div');
      pillGroup.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap;';

      // Collect all projects actually used in tasks
      const usedProjects = new Set();
      sections.forEach(s => {
        (tasks[s.id] || []).forEach(t => { if (t.project) usedProjects.add(t.project); });
      });

      const makeBtn = (label, filterVal) => {
        const b = document.createElement('button');
        const isActive = filterVal === activeProjectFilter;
        b.style.cssText = `
          padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
          border:1px solid ${isActive ? 'var(--accent)' : 'var(--border)'};
          background:${isActive ? 'var(--accent)' : 'var(--bg-card)'};
          color:${isActive ? 'white' : 'var(--text-secondary)'};
          cursor:pointer;font-family:inherit;transition:all 0.12s;
        `;
        b.textContent = label;
        b.addEventListener('click', () => {
          activeProjectFilter = isActive ? null : filterVal;
          renderFilterBar();
          renderTasks();
        });
        return b;
      };

      if (usedProjects.size > 0) {
        pillGroup.appendChild(makeBtn('All', null));
        [...usedProjects].sort().forEach(p => {
          const label = p.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*—.*$/, '').trim();
          pillGroup.appendChild(makeBtn(label, p));
        });
      }

      bar.appendChild(pillGroup);

      // Right side: Board / List toggle
      const toggle = document.createElement('div');
      toggle.id = 'taskViewToggle';
      toggle.className = 'view-toggle';
      toggle.style.marginLeft = 'auto';
      toggle.style.flexShrink = '0';
      toggle.innerHTML = `
        <button id="boardViewBtn" class="${currentView === 'board' ? 'active' : ''}">Board</button>
        <button id="listViewBtn"  class="${currentView === 'list'  ? 'active' : ''}">List</button>
      `;
      toggle.querySelector('#boardViewBtn').addEventListener('click', () => switchTaskView('board'));
      toggle.querySelector('#listViewBtn').addEventListener('click', () => switchTaskView('list'));
      bar.appendChild(toggle);
    }

    function fmtTs(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    const board = document.getElementById('board');
    const listView = document.getElementById('listView');

    function taskSectionId(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    const PROJECT_COLORS = {};

    function projectKey(name) {
      if (!name) return null;
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function parseTaskMarkdown(content) {
      const resultSections = [];
      const resultTasks = {};
      let currentSection = null;
      let currentSectionId = null;
      let currentProject = null;

      const lines = content.split('\n');
      let currentTask = null;

      for (const line of lines) {
        const headerMatch = line.match(/^## \*{0,2}(.+?)\*{0,2}$/);
        const projectMatch = line.match(/^### (.+)$/);
        if (headerMatch) {
          if (currentTask && currentSectionId) {
            resultTasks[currentSectionId].push(currentTask);
            currentTask = null;
          }

          const sectionName = headerMatch[1].trim();
          currentSectionId = taskSectionId(sectionName);
          currentSection = sectionName;
          currentProject = null;

          if (!resultTasks[currentSectionId]) {
            resultSections.push({ id: currentSectionId, name: sectionName });
            resultTasks[currentSectionId] = [];
          }
        } else if (projectMatch) {
          if (currentTask && currentSectionId) {
            resultTasks[currentSectionId].push(currentTask);
            currentTask = null;
          }
          currentProject = projectMatch[1].trim();
        } else if (currentSectionId && line.match(/^- \[[ xX]\]/)) {
          if (currentTask) {
            resultTasks[currentSectionId].push(currentTask);
          }
          const checked = line.match(/\[[xX]\]/) !== null;
          let text = line.replace(/^- \[[ xX]\]\s*/, '');
          let title = text;
          let note = '';

          const boldMatch = text.match(/^\*\*(.+?)\*\*(.*)$/);
          if (boldMatch) {
            title = boldMatch[1];
            note = boldMatch[2].replace(/^\s*-\s*/, '').trim();
          }

          currentTask = {
            id: Date.now() + Math.random(),
            title,
            note,
            checked,
            subtasks: [],
            section: currentSectionId,
            project: currentProject
          };
        } else if (currentTask && line.match(/^\s+- \[[ xX]\]/)) {
          const checked = line.match(/\[[xX]\]/) !== null;
          const text = line.replace(/^\s+- \[[ xX]\]\s*/, '');
          currentTask.subtasks.push({ text, checked });
        }
      }

      if (currentTask && currentSectionId) {
        resultTasks[currentSectionId].push(currentTask);
      }

      // Extract embedded activity data from HTML comment
      const actMatch = content.match(/<!--ACTIVITY_DATA\n([\s\S]*?)\n-->/);
      if (actMatch) {
        try { activityData = JSON.parse(actMatch[1]); } catch(e) { activityData = {}; }
      } else {
        activityData = {};
      }

      return { sections: resultSections, tasks: resultTasks };
    }

    function toMarkdown() {
      let md = '# Tasks\n';

      sections.forEach(section => {
        md += `\n## ${section.name}\n`;
        const sectionTasks = tasks[section.id] || [];

        // Group tasks by project to re-emit ### headings
        let lastProject = undefined;
        sectionTasks.forEach(t => {
          if (t.project !== lastProject) {
            lastProject = t.project;
            if (t.project) md += `\n### ${t.project}\n`;
          }
          const checkbox = t.checked ? '[x]' : '[ ]';
          const note = t.note ? ` - ${t.note}` : '';
          md += `- ${checkbox} **${t.title}**${note}\n`;
          t.subtasks.forEach(st => {
            const stCheckbox = st.checked ? '[x]' : '[ ]';
            md += `  - ${stCheckbox} ${st.text}\n`;
          });
        });
      });

      if (Object.keys(activityData).length > 0) {
        md += `\n<!--ACTIVITY_DATA\n${JSON.stringify(activityData)}\n-->`;
      }
      return md.trimEnd() + '\n';
    }

    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.id = task.id;

      const pKey = projectKey(task.project);
      const pColor = (pKey && PROJECT_COLORS[pKey]) || { bg: '#f3f4f6', text: '#6b7280' };
      const pLabel = task.project ? task.project.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*—.*$/, '').trim() : null;

      let html = `
        <button class="delete-btn" data-action="delete" title="Delete task">&times;</button>
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <span class="checkbox ${task.checked ? 'checked' : ''}" data-action="toggle" style="margin-top:2px;flex-shrink:0;"></span>
          <div style="flex:1;min-width:0;">
            <div class="card-title" style="${task.checked ? 'opacity:0.45;text-decoration:line-through;' : ''}">${task.title}</div>
            ${pLabel ? `<span class="project-badge" style="background:${pColor.bg};color:${pColor.text};margin-top:5px;margin-bottom:0;display:inline-block;">${pLabel}</span>` : ''}
            ${task.note ? `<div class="card-note" style="margin-top:5px;">${task.note}</div>` : ''}
          </div>
        </div>
      `;

      if (task.subtasks.length > 0) {
        html += '<div class="card-subtasks" style="margin-top:8px;padding-left:25px;">';
        task.subtasks.forEach((st, idx) => {
          html += `<div class="subtask">
            <span class="checkbox ${st.checked ? 'checked' : ''}" data-action="toggle-sub" data-idx="${idx}" style="width:14px;height:14px;min-width:14px;min-height:14px;border-radius:3px;"></span>
            <span style="${st.checked ? 'opacity:0.4;text-decoration:line-through;' : ''}">${st.text}</span>
          </div>`;
        });
        html += '</div>';
      }

      // Activity footer — subtle count tucked in the bottom-right
      const actCount = getActivity(task.title).length;
      html += `
        <div class="card-footer">
          <button data-action="toggle-timeline"
            style="background:none;border:none;padding:0;cursor:pointer;font-size:10.5px;color:var(--text-muted);font-family:inherit;display:flex;align-items:center;gap:3px;line-height:1;">
            <span>◷</span>
            <span>${actCount > 0 ? actCount : ''}</span>
          </button>
        </div>
        <div class="card-timeline" style="display:none;flex-direction:column;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);"></div>
      `;

      card.innerHTML = html;

      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));

      card.addEventListener('click', (e) => {
        const action = e.target.closest('[data-action]')?.dataset.action || e.target.dataset.action;
        if (action === 'toggle') {
          pushUndo();
          task.checked = !task.checked;
          markChanged();
          renderTasks();
        } else if (action === 'toggle-sub') {
          pushUndo();
          const idx = parseInt(e.target.dataset.idx);
          task.subtasks[idx].checked = !task.subtasks[idx].checked;
          markChanged();
          renderTasks();
        } else if (action === 'delete') {
          deleteTask(task);
        } else if (action === 'toggle-timeline') {
          e.stopPropagation();
          toggleCardTimeline(card, task);
        } else {
          openCardModal(task);
        }
      });

      return card;
    }

    function toggleCardTimeline(card, task) {
      const timelineEl = card.querySelector('.card-timeline');
      const isOpen = timelineEl.style.display === 'flex';

      if (isOpen) {
        timelineEl.style.display = 'none';
        return;
      }

      const entries = getActivity(task.title);
      const ICONS = { move: '→', edit: '✏', comment: '💬', created: '✦' };

      if (!entries.length) {
        timelineEl.innerHTML = `<div style="font-size:11px;color:var(--text-muted);font-style:italic;padding:2px 0;">No activity yet.</div>`;
      } else {
        timelineEl.innerHTML = entries.map(e => {
          const icon = ICONS[e.type] || '•';
          let desc = '';
          if (e.type === 'move')    desc = `<b>${e.from}</b> → <b>${e.to}</b>`;
          if (e.type === 'edit')    desc = `${e.field} updated`;
          if (e.type === 'comment') desc = escapeHtml(e.content);
          if (e.type === 'created') desc = `Created in <b>${e.column}</b>`;
          return `
            <div style="font-size:11px;line-height:1.4;display:flex;gap:6px;">
              <span style="color:var(--text-muted);flex-shrink:0;">${icon}</span>
              <div>
                <div style="color:var(--text-primary);">${desc}</div>
                <div style="color:var(--text-muted);font-size:10px;">${fmtTs(e.ts)}</div>
              </div>
            </div>`;
        }).join('');
      }

      timelineEl.style.display = 'flex';
    }

    function openCardModal(task) {
      // Build a working copy of subtasks so we can edit without mutating until save
      let subtasksCopy = task.subtasks.map(s => ({ ...s }));

      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed; inset: 0; background: rgba(0,0,0,0.45);
        display: flex; align-items: center; justify-content: center;
        z-index: 2000; padding: 24px;
      `;

      const hasProjects = KNOWN_PROJECTS.length > 0;
      const projectOptions = buildProjectOptions(task.project);

      const inputBase = `width:100%;box-sizing:border-box;font-family:inherit;color:var(--text-primary);outline:none;background:transparent;border:none;border-bottom:1.5px solid var(--border-light);padding:8px 2px;transition:border-color 0.15s;`;
      const fieldStyle = `width:100%;box-sizing:border-box;font-family:inherit;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:7px;padding:8px 10px;color:var(--text-primary);font-size:13px;outline:none;`;

      overlay.innerHTML = `
        <div style="background:var(--bg-card);border-radius:16px;width:100%;max-width:640px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-height:88vh;overflow:hidden;">

          <!-- Header bar — title spans full width -->
          <div style="padding:18px 24px 16px;flex-shrink:0;border-bottom:1px solid var(--border-light);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Task</div>
              <button id="cmClose" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);line-height:1;padding:2px 6px;border-radius:4px;">&times;</button>
            </div>
            <textarea id="cmTitle" rows="1" placeholder="Task title"
              style="width:100%;box-sizing:border-box;font-family:inherit;font-size:18px;font-weight:600;letter-spacing:-0.01em;color:var(--text-primary);background:transparent;border:none;border-bottom:2px solid var(--border-light);padding:4px 0 8px;outline:none;transition:border-color 0.15s;resize:none;overflow:hidden;line-height:1.3;display:block;">${escapeHtml(task.title)}</textarea>
          </div>

          <!-- Body: two columns -->
          <div style="display:flex;flex:1;min-height:0;">

            <!-- Left: fields -->
            <div style="flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;border-right:1px solid var(--border-light);">

              <!-- Note -->
              <div>
                <label style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:6px;">Note</label>
                <textarea id="cmNote" rows="2" placeholder="Add context…"
                  style="width:100%;box-sizing:border-box;font-family:inherit;font-size:13px;color:var(--text-primary);background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:8px;padding:10px 12px;resize:none;outline:none;line-height:1.5;">${task.note || ''}</textarea>
              </div>

              <!-- Project + Column row -->
              <div style="display:flex;gap:10px;">
                <div style="flex:1;">
                  <label style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:6px;">Project</label>
                  <div style="display:flex;gap:8px;align-items:center;">
                    ${hasProjects
                      ? `<select id="cmProject" style="${fieldStyle} flex:1;cursor:pointer;">${projectOptions}<option value="__new__">＋ New project…</option></select>
                         <button id="cmNewProject" title="New project"
                           style="flex-shrink:0;width:34px;height:34px;border-radius:7px;border:1.5px dashed var(--border);background:none;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">+</button>`
                      : `<input id="cmProject" type="text" placeholder="Project name (optional)" value="${escapeHtml(task.project || '')}" style="${fieldStyle} flex:1;">`
                    }
                  </div>
                </div>
                <div style="flex:0 0 140px;">
                  <label style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:6px;">Column</label>
                  <select id="cmSection" style="${fieldStyle} cursor:pointer;">
                    ${sections.map(s => `<option value="${s.id}"${s.id === task.section ? ' selected' : ''}>${s.name}</option>`).join('')}
                  </select>
                </div>
              </div>

              <!-- Subtasks -->
              <div>
                <label style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:8px;">Subtasks</label>
                <div id="cmSubtasks" style="display:flex;flex-direction:column;gap:4px;"></div>
                <button id="cmAddSub"
                  style="margin-top:8px;background:none;border:none;padding:4px 2px;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:6px;">
                  <span style="font-size:16px;line-height:1;">+</span> Add subtask
                </button>
              </div>

              <!-- Actions -->
              <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px;margin-top:auto;">
                <button id="cmCancel" style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-secondary);font-family:inherit;cursor:pointer;font-size:13px;">Cancel</button>
                <button id="cmSave" style="padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px;">Save</button>
              </div>
            </div>

            <!-- Right: activity -->
            <div style="width:230px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-secondary);border-radius:0 0 16px 0;">
              <div style="padding:16px 16px 10px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Activity</div>
              <div id="cmTimeline" style="flex:1;overflow-y:auto;padding:0 16px 12px;display:flex;flex-direction:column;gap:12px;"></div>
              <div style="padding:10px 12px;border-top:1px solid var(--border-light);background:var(--bg-card);border-radius:0 0 16px 0;position:relative;">
                <input id="cmComment" type="text" placeholder="Add a comment…"
                  style="width:100%;box-sizing:border-box;font-family:inherit;font-size:12px;background:var(--bg-secondary);border:1.5px solid var(--border-light);border-radius:20px;padding:7px 36px 7px 12px;color:var(--text-primary);outline:none;transition:border-color 0.15s;">
                <button id="cmPostComment" title="Post comment"
                  style="position:absolute;right:20px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;color:var(--text-muted);transition:background 0.15s,color 0.15s,transform 0.1s;padding:0;opacity:0.45;">
                  <svg width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 12V2M7 2L3 6M7 2L11 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      const renderSubtasks = () => {
        const container = overlay.querySelector('#cmSubtasks');
        container.innerHTML = '';
        subtasksCopy.forEach((st, idx) => {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:3px 0;';
          row.innerHTML = `
            <span class="checkbox ${st.checked ? 'checked' : ''}" data-idx="${idx}" style="flex-shrink:0;cursor:pointer;"></span>
            <input type="text" value="${st.text.replace(/"/g, '&quot;')}" data-idx="${idx}"
              style="flex:1;font-family:inherit;font-size:13px;color:var(--text-primary);background:transparent;border:none;border-bottom:1px solid var(--border-light);padding:3px 0;outline:none;">
            <button data-del="${idx}"
              style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;opacity:0.5;flex-shrink:0;">&times;</button>
          `;
          container.appendChild(row);

          row.querySelector('.checkbox').addEventListener('click', () => {
            subtasksCopy[idx].checked = !subtasksCopy[idx].checked;
            renderSubtasks();
          });
          row.querySelector('input').addEventListener('input', (e) => {
            subtasksCopy[idx].text = e.target.value;
          });
          row.querySelector('[data-del]').addEventListener('click', () => {
            subtasksCopy.splice(idx, 1);
            renderSubtasks();
          });
        });
      };

      renderSubtasks();

      overlay.querySelector('#cmAddSub').addEventListener('click', () => {
        subtasksCopy.push({ text: '', checked: false });
        renderSubtasks();
        const inputs = overlay.querySelectorAll('#cmSubtasks input');
        inputs[inputs.length - 1]?.focus();
      });

      // ── Timeline rendering ───────────────────────────────────────
      const ACTIVITY_ICONS = { move: '→', edit: '✏', comment: '💬', created: '✦' };
      const renderTimeline = () => {
        const container = overlay.querySelector('#cmTimeline');
        const entries = getActivity(task.title);
        if (!entries.length) {
          container.innerHTML = `<div style="font-size:12px;color:var(--text-muted);font-style:italic;">No activity yet.</div>`;
          return;
        }
        container.innerHTML = entries.map(e => {
          const icon = ACTIVITY_ICONS[e.type] || '•';
          let desc = '';
          if (e.type === 'move')    desc = `<b>${e.from}</b> → <b>${e.to}</b>`;
          if (e.type === 'edit')    desc = `${e.field} updated`;
          if (e.type === 'comment') desc = escapeHtml(e.content);
          if (e.type === 'created') desc = `Created in <b>${e.column}</b>`;
          return `
            <div style="font-size:11px;line-height:1.4;">
              <div style="color:var(--text-muted);margin-bottom:2px;">${icon} ${fmtTs(e.ts)}</div>
              <div style="color:var(--text-primary);">${desc}</div>
            </div>`;
        }).join('');
      };
      renderTimeline();

      const close = () => overlay.remove();

      const save = () => {
        const newTitle   = overlay.querySelector('#cmTitle').value.trim();
        if (!newTitle) return;
        const newNote    = overlay.querySelector('#cmNote').value.trim();
        const newProject = getProjectElValue(overlay.querySelector('#cmProject'));
        const newSection = overlay.querySelector('#cmSection').value;
        pushUndo();
        // Record edits before applying
        if (newTitle   !== task.title)      recordActivity(task.title, { type: 'edit', field: 'title',   from: task.title,   to: newTitle });
        if (newNote    !== (task.note||'')) recordActivity(task.title, { type: 'edit', field: 'note' });
        if (newProject !== task.project)   recordActivity(task.title, { type: 'edit', field: 'project', from: task.project, to: newProject });
        // Move between columns if changed
        if (newSection !== task.section) {
          const fromName = sections.find(s => s.id === task.section)?.name || task.section;
          const toName   = sections.find(s => s.id === newSection)?.name   || newSection;
          recordActivity(task.title, { type: 'move', from: fromName, to: toName });
          // Remove from old section
          if (tasks[task.section]) {
            const idx = tasks[task.section].findIndex(t => t.id === task.id);
            if (idx !== -1) tasks[task.section].splice(idx, 1);
          }
          // Add to new section
          if (!tasks[newSection]) tasks[newSection] = [];
          tasks[newSection].push(task);
          task.section = newSection;
        }
        task.title    = newTitle;
        task.note     = newNote;
        task.project  = newProject;
        task.subtasks = subtasksCopy.filter(s => s.text.trim());
        markChanged();
        renderTasks();
        close();
      };

      // "＋ New project…" inline in the select
      const cmProjectSel = overlay.querySelector('#cmProject');
      if (cmProjectSel && cmProjectSel.tagName === 'SELECT') {
        cmProjectSel.addEventListener('change', () => {
          if (cmProjectSel.value !== '__new__') return;
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.id = 'cmProject';
          inp.placeholder = 'New project name…';
          inp.style.cssText = fieldStyle + ' flex:1;';
          const btn = overlay.querySelector('#cmNewProject');
          cmProjectSel.replaceWith(inp);
          if (btn) btn.remove();
          inp.focus();
        });
      }

      const cmNewProjBtn = overlay.querySelector('#cmNewProject');
      if (cmNewProjBtn) {
        cmNewProjBtn.addEventListener('click', () => {
          promptNewProject((newName) => {
            const sel = overlay.querySelector('#cmProject');
            if (sel && sel.tagName === 'SELECT') sel.innerHTML = buildProjectOptions(newName);
          });
        });
      }

      const postComment = () => {
        const input = overlay.querySelector('#cmComment');
        const text = input.value.trim();
        if (!text) return;
        recordActivity(task.title, { type: 'comment', content: text });
        input.value = '';
        const btn = overlay.querySelector('#cmPostComment');
        btn.style.background = 'none';
        btn.style.color = 'var(--text-muted)';
        btn.style.opacity = '0.45';
        btn.style.transform = 'translateY(-50%)';
        renderTimeline();
      };
      overlay.querySelector('#cmPostComment').addEventListener('click', postComment);
      overlay.querySelector('#cmComment').addEventListener('keydown', e => { if (e.key === 'Enter') postComment(); });
      overlay.querySelector('#cmComment').addEventListener('input', (e) => {
        const btn = overlay.querySelector('#cmPostComment');
        const hasContent = e.target.value.trim().length > 0;
        btn.style.background = hasContent ? 'var(--accent)' : 'none';
        btn.style.color = hasContent ? 'white' : 'var(--text-muted)';
        btn.style.opacity = hasContent ? '1' : '0.45';
        btn.style.transform = hasContent ? 'translateY(-50%) scale(1.08)' : 'translateY(-50%)';
      });

      overlay.querySelector('#cmSave').addEventListener('click', save);
      overlay.querySelector('#cmClose').addEventListener('click', close);
      overlay.querySelector('#cmCancel').addEventListener('click', close);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
      // Auto-grow title textarea
      const cmTitleEl = overlay.querySelector('#cmTitle');
      const growCmTitle = () => { cmTitleEl.style.height = 'auto'; cmTitleEl.style.height = cmTitleEl.scrollHeight + 'px'; };
      cmTitleEl.addEventListener('input', growCmTitle);
      setTimeout(growCmTitle, 0);

      overlay.querySelector('#cmTitle').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); save(); } if (e.key === 'Escape') close(); });
      document.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', escHandler); }
      });

      overlay.querySelector('#cmTitle').focus();
    }

    function startEditingColumnTitle(titleEl, colId) {
      const section = sections.find(s => s.id === colId);
      if (!section) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = section.name;
      input.style.cssText = 'width: 180px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 10px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== section.name) {
          const oldId = section.id;
          section.name = newName;
          const newId = taskSectionId(newName);
          if (newId !== oldId) {
            tasks[newId] = tasks[oldId] || [];
            delete tasks[oldId];
            tasks[newId].forEach(t => t.section = newId);
            section.id = newId;
          }
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function createColumn(id, title, items, totalCount) {
      const col = document.createElement('div');
      col.className = 'column';
      const countLabel = (activeProjectFilter && totalCount !== items.length)
        ? `${items.length}/${totalCount}` : items.length;
      const isEmpty = totalCount === 0;
      col.innerHTML = `
        <div class="column-header">
          <span class="column-title" data-section-id="${id}" style="cursor: pointer;">${title}</span>
          <div style="display:flex;align-items:center;gap:6px;">
            ${isEmpty ? `<button class="col-delete-btn" data-delete="${id}" title="Delete column"
              style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;line-height:1;padding:1px 4px;border-radius:4px;opacity:0.5;font-family:inherit;">&times;</button>` : ''}
            <span class="count">${countLabel}</span>
          </div>
        </div>
        <div class="cards" data-column="${id}"></div>
      `;

      col.querySelector('.column-title').addEventListener('click', (e) => {
        if (!col.dragging) { startEditingColumnTitle(e.target, id); }
      });

      const deleteBtn = col.querySelector('.col-delete-btn');
      if (deleteBtn) {
        deleteBtn.addEventListener('mouseenter', () => deleteBtn.style.opacity = '1');
        deleteBtn.addEventListener('mouseleave', () => deleteBtn.style.opacity = '0.5');
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = sections.findIndex(s => s.id === id);
          if (idx !== -1) {
            sections.splice(idx, 1);
            delete tasks[id];
            markChanged();
            renderTasks();
          }
        });
      }

      const header = col.querySelector('.column-header');
      header.draggable = true;

      header.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        col.classList.add('dragging-column');
        e.dataTransfer.setData('text/column', id);
        e.dataTransfer.effectAllowed = 'move';
      });

      header.addEventListener('dragend', () => {
        col.classList.remove('dragging-column');
        board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
      });

      col.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
          const indicator = document.createElement('div');
          indicator.className = 'column-drop-indicator';
          const rect = col.getBoundingClientRect();
          if (e.clientX < rect.left + rect.width / 2) { col.before(indicator); }
          else { col.after(indicator); }
        }
      });

      col.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          const fromId = e.dataTransfer.getData('text/column');
          const toId = id;
          if (fromId !== toId) {
            const rect = col.getBoundingClientRect();
            const insertBefore = e.clientX < rect.left + rect.width / 2;
            moveSection(fromId, toId, insertBefore);
          }
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
        }
      });

      const cardsContainer = col.querySelector('.cards');
      items.forEach(task => { cardsContainer.appendChild(createCard(task)); });

      const getDropPosition = (e) => {
        const allCards = [...cardsContainer.querySelectorAll('.task-card')];
        const visibleCards = allCards.filter(c => !c.classList.contains('dragging'));
        let insertBeforeCard = null;
        let dropIndex = visibleCards.length;
        for (let i = 0; i < visibleCards.length; i++) {
          const rect = visibleCards[i].getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            insertBeforeCard = visibleCards[i];
            dropIndex = i;
            break;
          }
        }
        return { insertBeforeCard, dropIndex };
      };

      const showDropIndicator = (e) => {
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const { insertBeforeCard } = getDropPosition(e);
        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        indicator.style.cssText = 'height: 3px; background: var(--accent); border-radius: 2px; margin: 5px 0;';
        if (insertBeforeCard) { cardsContainer.insertBefore(indicator, insertBeforeCard); }
        else { cardsContainer.appendChild(indicator); }
      };

      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardsContainer.classList.add('drag-over');
        showDropIndicator(e);
      });

      col.addEventListener('dragleave', (e) => {
        if (!col.contains(e.relatedTarget)) {
          cardsContainer.classList.remove('drag-over');
          col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        }
      });

      col.addEventListener('drop', (e) => {
        e.preventDefault();
        cardsContainer.classList.remove('drag-over');
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const taskId = parseFloat(e.dataTransfer.getData('text/plain'));
        const { dropIndex } = getDropPosition(e);
        moveTask(taskId, id, dropIndex);
      });

      return col;
    }

    const KNOWN_PROJECTS = [];

    const PROJECT_PALETTE = [
      { bg: '#fce7f3', text: '#9d174d' },
      { bg: '#ffedd5', text: '#9a3412' },
      { bg: '#ecfdf5', text: '#065f46' },
      { bg: '#e0f2fe', text: '#075985' },
      { bg: '#f5f3ff', text: '#4c1d95' },
      { bg: '#fef9c3', text: '#854d0e' },
      { bg: '#fce7f3', text: '#831843' },
      { bg: '#d1fae5', text: '#064e3b' },
    ];

    function addNewProject(name) {
      if (!name || KNOWN_PROJECTS.includes(name)) return;
      KNOWN_PROJECTS.push(name);
      // Assign next color from palette (cycling)
      const existingCustomCount = KNOWN_PROJECTS.length - 5; // 5 built-in
      const color = PROJECT_PALETTE[existingCustomCount % PROJECT_PALETTE.length];
      const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      PROJECT_COLORS[key] = color;
    }

    function buildProjectOptions(selectedValue) {
      const opts = `<option value="">No project</option>` +
        KNOWN_PROJECTS.map(p => {
          const label = p.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*—.*$/, '').trim();
          const sel = p === selectedValue ? 'selected' : '';
          return `<option value="${p}" ${sel}>${label}</option>`;
        }).join('');
      return opts;
    }

    // Returns a <select> (with projects + "＋ New project…" option) or a plain <input>
    // when there are no projects yet. Handles swapping select→input when user picks "+ New".
    function makeProjectEl(selectedValue) {
      const sharedStyle = `font-size:11px;font-family:inherit;padding:4px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-secondary);color:var(--text-muted);`;
      if (KNOWN_PROJECTS.length === 0) {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = 'Project (optional)';
        inp.style.cssText = sharedStyle + 'min-width:130px;';
        return inp;
      }
      const sel = document.createElement('select');
      sel.style.cssText = sharedStyle + 'cursor:pointer;';
      sel.innerHTML = buildProjectOptions(selectedValue) + `<option value="__new__">＋ New project…</option>`;
      sel.addEventListener('change', () => {
        if (sel.value !== '__new__') return;
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = 'New project name…';
        inp.style.cssText = sharedStyle + 'min-width:130px;';
        sel.replaceWith(inp);
        inp.focus();
      });
      return sel;
    }

    // Read project value from either a <select> or <input>, registering new names.
    function getProjectElValue(el) {
      if (!el) return null;
      const v = (el.value || '').trim();
      if (!v || v === '__new__') return null;
      addNewProject(v); // no-op if already known
      return v;
    }

    function promptNewProject(onCreated) {
      const overlay = document.createElement('div');
      overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:3000;`;
      overlay.innerHTML = `
        <div style="background:var(--bg-card);border-radius:12px;padding:24px;width:320px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
          <div style="font-size:15px;font-weight:600;color:var(--text-primary);">New project</div>
          <input id="npName" type="text" placeholder="Project name" style="width:100%;box-sizing:border-box;font-family:inherit;background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:8px;padding:10px 12px;color:var(--text-primary);font-size:14px;outline:none;">
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button id="npCancel" style="padding:7px 16px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text-primary);font-family:inherit;cursor:pointer;">Cancel</button>
            <button id="npSave" style="padding:7px 16px;border-radius:7px;border:none;background:var(--accent);color:white;font-family:inherit;font-weight:600;cursor:pointer;">Create</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const input = overlay.querySelector('#npName');
      input.focus();
      const close = () => overlay.remove();
      const save = () => {
        const name = input.value.trim();
        if (!name) return;
        addNewProject(name);
        close();
        onCreated(name);
      };
      overlay.querySelector('#npSave').addEventListener('click', save);
      overlay.querySelector('#npCancel').addEventListener('click', close);
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') close(); });
    }

    function addNewTask(sectionId, container) {
      const existing = container.querySelector('.new-task-wrapper');
      if (existing) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'new-task-wrapper';
      wrapper.style.cssText = 'display: flex; flex-direction: column; gap: 6px;';

      const input = document.createElement('textarea');
      input.className = 'new-task-input';
      input.placeholder = 'Task title… (Enter to add, Esc to cancel)';
      input.rows = 2;

      const projectEl = makeProjectEl(null);

      wrapper.appendChild(input);
      wrapper.appendChild(projectEl);
      container.appendChild(wrapper);
      input.focus();

      const commit = () => {
        const title = input.value.trim();
        if (title) {
          pushUndo();
          if (!tasks[sectionId]) tasks[sectionId] = [];
          const sectionName = sections.find(s => s.id === sectionId)?.name || sectionId;
          // Find whichever project element is currently in the wrapper (may have swapped)
